name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # app/google-services.json is gitignored; the google-services plugin needs a
      # structurally valid file to generate resources. Unit tests make no network
      # calls, so the tracked copy is sufficient.
      - name: Provide google-services.json
        run: cp app/libs/google-services.json app/google-services.json

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
